<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Overlay</title>
    <script type="module" src="/src/main.ts" defer></script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="hud">
      <header id="titlebar" data-tauri-drag-region>
        <span class="logo" data-tauri-drag-region>⌬ AGENT OVERLAY</span>
        <span id="status-badge" class="badge hidden">0 running · 0 idle</span>
        <span class="spacer" data-tauri-drag-region></span>
        <span class="hint" data-tauri-drag-region>Ctrl+Shift+Space to toggle</span>
        <button id="btn-refresh" title="Refresh sessions">⟳</button>
        <button id="btn-launch" title="Launch a new agent session">＋</button>
        <button id="btn-hide" title="Hide overlay">─</button>
      </header>

      <div id="board">
        <div class="column" id="col-running">
          <div class="col-header running">
            <span class="col-dot">●</span> Running
            <span class="col-count" id="count-running">0</span>
          </div>
          <div class="col-cards" id="cards-running"></div>
        </div>
        <div class="col-divider"></div>
        <div class="column" id="col-idle">
          <div class="col-header idle">
            <span class="col-dot">○</span> Idle
            <span class="col-count" id="count-idle">0</span>
          </div>
          <div class="col-cards" id="cards-idle"></div>
        </div>
        <div class="col-divider"></div>
        <div class="column" id="col-error">
          <div class="col-header error">
            <span class="col-dot">✕</span> Error
            <span class="col-count" id="count-error">0</span>
          </div>
          <div class="col-cards" id="cards-error"></div>
        </div>
      </div>

      <div id="empty" class="hidden">
        <p>No agent sessions found.</p>
        <p class="hint">Start <code>claude</code>, <code>codex</code>, <code>gemini</code>… in any terminal.</p>
      </div>

      <dialog id="launch-dialog">
        <form method="dialog" id="launch-form">
          <h3>Launch agent session</h3>
          <label>Agent
            <select id="launch-agent">
              <option value="claude">claude</option>
              <option value="codex">codex</option>
              <option value="gemini">gemini</option>
              <option value="opencode">opencode</option>
              <option value="pi">pi</option>
            </select>
          </label>
          <label>Directory
            <input id="launch-cwd" type="text" placeholder="/path/to/project" />
          </label>
          <menu>
            <button value="cancel">Cancel</button>
            <button value="ok" id="launch-ok">Launch</button>
          </menu>
        </form>
      </dialog>
    </div>
  </body>
</html>
